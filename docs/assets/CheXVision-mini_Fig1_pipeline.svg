<svg viewBox="0 0 1680 648" width="1680" height="648" style="display:block" xmlns="http://www.w3.org/2000/svg"><defs></defs><rect x="0" y="0" width="1680" height="648" fill="#ffffff"></rect><rect x="56" y="96" width="1568" height="168" rx="14" fill="#f7fafd" stroke="#e2e6ec" stroke-width="1.2"></rect><rect x="56" y="386" width="1568" height="168" rx="14" fill="#f8fbfd" stroke="#e2e6ec" stroke-width="1.2"></rect><text x="74" y="84" text-anchor="start" style="font:700 12.5px &#39;Inter&#39;, sans-serif;fill:#20242c;letter-spacing:1.4px;text-transform:uppercase;">INPUT PIPELINE</text><text x="222" y="84" text-anchor="start" style="font:400 12.5px &#39;Inter&#39;, sans-serif;fill:#737a88;">— pure NumPy · streamed &amp; downsampled on the fly</text><text x="74" y="374" text-anchor="start" style="font:700 12.5px &#39;Inter&#39;, sans-serif;fill:#20242c;letter-spacing:1.4px;text-transform:uppercase;">TRAINING LOOP</text><text x="228" y="374" text-anchor="start" style="font:400 12.5px &#39;Inter&#39;, sans-serif;fill:#737a88;">— per mini-batch · CPU only · no autograd</text><path d="M92 126 V238 A116 14 0 0 0 324 238 V126" fill="#e1ecfb" stroke="#9cbbe4" stroke-width="1.3"></path><ellipse cx="208" cy="126" rx="116" ry="14" fill="#eff5fe" stroke="#9cbbe4" stroke-width="1.3"></ellipse><text x="208" y="168" text-anchor="middle" style="font:700 13.5px &#39;JetBrains Mono&#39;, monospace;fill:#214f96;">ChestX-ray14</text><text x="208" y="194" text-anchor="middle" style="font:400 12px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">320px parquet · HF</text><text x="208" y="214" text-anchor="middle" style="font:400 12px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">streamed, not stored</text><text x="208" y="274" text-anchor="middle" style="font:400 11.5px &#39;Inter&#39;, sans-serif;fill:#737a88;">NIH chest X-rays</text><rect x="520" y="122" width="300" height="116" rx="12" fill="#ffffff" stroke="#c6ccd6" stroke-width="1.3"></rect><text x="670" y="152" text-anchor="middle" style="font:700 16.5px &#39;Inter&#39;, sans-serif;fill:#20242c;">Downsample</text><text x="670" y="178" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">64 × 64 grayscale</text><text x="670" y="200" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">flatten → 4096 floats</text><rect x="980" y="122" width="320" height="116" rx="12" fill="#ffffff" stroke="#c6ccd6" stroke-width="1.3"></rect><text x="1140" y="152" text-anchor="middle" style="font:700 16.5px &#39;Inter&#39;, sans-serif;fill:#20242c;">Standardize</text><text x="1140" y="178" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">z = (x − μ) / σ   ·   train stats</text><text x="1140" y="200" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">light augment (flip · noise)</text><line x1="330" y1="180" x2="503.9" y2="180" stroke="#3b414d" stroke-width="1.9" stroke-linecap="round"></line><path d="M512 180 L503.71045105397405 183.50476508077784 L503.71045105397405 176.49523491922216 Z" fill="#3b414d"></path><line x1="826" y1="180" x2="963.9" y2="180" stroke="#3b414d" stroke-width="1.9" stroke-linecap="round"></line><path d="M972 180 L963.710451053974 183.50476508077784 L963.710451053974 176.49523491922216 Z" fill="#3b414d"></path><path d="M1300 264 L1300 332 L1472 332 L1472 386" fill="none" stroke="#2f6fd6" stroke-width="1.9" stroke-linejoin="round" stroke-linecap="round"></path><path d="M1472 386 L1468.4952349192222 377.71045105397405 L1475.5047650807778 377.71045105397405 Z" fill="#2f6fd6"></path><rect x="1296" y="320" width="180" height="26" rx="13" fill="#fff" stroke="#9cbbe4" stroke-width="1.1"></rect><text x="1386" y="337" text-anchor="middle" style="font:600 12px &#39;JetBrains Mono&#39;, monospace;fill:#214f96;">mini-batch · 256</text><rect x="1322" y="412" width="300" height="116" rx="12" fill="#ffffff" stroke="#c6ccd6" stroke-width="1.