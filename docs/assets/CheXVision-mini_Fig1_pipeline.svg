ext-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">Adam + cosine LR</text><text x="527" y="490" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">L2 decay · dropout</text><rect x="60" y="412" width="308" height="116" rx="12" fill="#ffffff" stroke="#c6ccd6" stroke-width="1.3"></rect><path d="M61.5 424 a10.5 10.5 0 0 1 10.5 -10.5 M61.5 516 a10.5 10.5 0 0 0 10.5 10.5"></path><rect x="60" y="412" width="4" height="116" rx="2" fill="#cf6037"></rect><rect x="64" y="412" width="6" height="116" fill="#ffffff"></rect><text x="224" y="442" text-anchor="middle" style="font:700 16.5px &#39;Inter&#39;, sans-serif;fill:#20242c;">Validate + select</text><text x="224" y="468" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">val AUC each epoch</text><text x="224" y="490" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">best ckpt · Youden-J thresh</text><line x1="1316" y1="470" x2="1320.1" y2="470" stroke="#3b414d" stroke-width="1.9" stroke-linecap="round"></line><path d="M1312 470 L1320.289548946026 466.4952349192221 L1320.289548946026 473.5047650807779 Z" fill="#3b414d"></path><line x1="998" y1="470" x2="1002.1" y2="470" stroke="#3b414d" stroke-width="1.9" stroke-linecap="round"></line><path d="M994 470 L1002.289548946026 466.4952349192221 L1002.289548946026 473.5047650807779 Z" fill="#3b414d"></path><line x1="680" y1="470" x2="684.1" y2="470" stroke="#3b414d" stroke-width="1.9" stroke-linecap="round"></line><path d="M676 470 L684.289548946026 466.4952349192221 L684.289548946026 473.5047650807779 Z" fill="#3b414d"></path><line x1="380" y1="470" x2="384.1" y2="470" stroke="#3b414d" stroke-width="1.9" stroke-linecap="round"></line><path d="M376 470 L384.28954894602595 466.4952349192221 L384.28954894602595 473.5047650807779 Z" fill="#3b414d"></path><path d="M527 554 L527 600 L1472 600 L1472 554" fill="none" stroke="