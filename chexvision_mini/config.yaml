# Default configuration for the from-scratch NumPy net.
# CLI flags (see `python -m chexvision_mini --help`) override these; the per-mode
# block under `data.modes` overrides sample counts and epochs for each run mode.

seed: 42
image_size: 64          # images are downsampled to 64x64 grayscale -> 4096 inputs

model:
  hidden_dims: [1024, 256, 64]  # MLP hidden widths (Linear -> ReLU -> Dropout per entry)
  dropout: 0.3                  # inverted dropout after each hidden activation

training:
  optimizer: adam         # "adam", "rmsprop", or "sgd"
  lr: 0.001
  lr_min: 0.00001         # floor for the cosine schedule
  lr_schedule: cosine     # "cosine" or "none"
  momentum: 0.9           # used only by SGD
  weight_decay: 0.0001    # L2 penalty (weights only)
  l1: 0.0                 # L1 penalty (weights only); 0 disables
  label_smoothing: 0.05
  batch_size: 256
  epochs: 20              # overridden per mode below
  augment: true

data:
  dataset_repo: arudaev/chest-xray-14-320
  standardize: true       # per-feature zero-mean/unit-variance (stats from train)
  modes:
    # train / validation (model selection) / test (untouched, final eval).
    # shuffle_buffer randomises the HF stream before take() so each subset is a
    # representative, class-balanced sample (the parquet shards are label-ordered).
    # It scales with subset size — a big buffer would make `local` needlessly slow.
    synthetic: { n_train: 512, n_val: 256, n_test: 256, epochs: 15, shuffle_buffer: 0 }
    local:     { n_train: 600, n_val: 300, n_test: 300, epochs: 12, shuffle_buffer: 3000 }
    # Overnight Kaggle CPU run: more data is the bigger lever than more epochs for
    # an MLP; this plateaus well within the 12h kernel cap (save-best keeps the peak).
    kaggle:    { n_train: 60000, n_val: 10000, n_test: 10000, epochs: 200, shuffle_buffer: 30000 }
